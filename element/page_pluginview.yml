-
  type: h2
  innerHTML: rs:plugin 
-
  type: widget
  data:
    plugin: bootstrap/navtabs_v1
    method: embed
    data:
      id: navtabs_pluginview
      item:
        -
          text: Readme
          content:
            -
              type: widget
              data:
                plugin: readme/parser
                method: readme
                data:
                  content: rs:readme
            -
              type: div
              settings:
                enabled: plugin_settings:depricated
              attribute: 
                class: alert alert-warning
              innerHTML: This plugin is depricated!
            -
              type: div
              settings:
                disabled: plugin_settings:depricated
              attribute: 
                class: alert alert-success
              innerHTML: This plugin is NOT depricated!
