- 
  type: widget
  data:
    plugin: wf/table
    method: render_many
    data:
      id: dt_editor_theme
      class:
        table: table-sm table-striped
      field:
        name: Name
        folder: Folder
      datatable:
        ajax: /editor/theme_data
        order:
          -
            - 0
            - asc
-
  type: script
  innerHTML: |
    $('#dt_editor_theme tbody').on( 'click', 'tr', function () {
      var theme = datatable_dt_editor_theme.row( this ).data().theme;
      var folder = datatable_dt_editor_theme.row( this ).data().folder;
      $.get('/editor/themeload?theme='+theme+'&folder='+folder, function(data){PluginWfCallbackjson.call( data );});
    } );
