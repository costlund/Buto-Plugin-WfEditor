settings:
  path: 'container/innerHTML'
content:
  style1:
    type: style
    innerHTML: '.wf_form_row{margin-top:10px;}'
  bootstrap_menu2:
    type: widget
    data:
      plugin: 'bootstrap/navbar_v1'
      method: navbar
      data:
        navbar_theme: light
        bg: secondary
        navbar:
          id: _my_navbar_id_
          item:
            -
              text: Theme
              href: "javascript:PluginWfBootstrapjs.modal({id: 'modal_plugin', url: '/editor/theme', label: 'Themes', size: 'lg'});"
            -
              text: I18N
              href: "javascript:PluginWfBootstrapjs.modal({id: 'modal_i18n', url: '/editor/i18n', label: 'I18N', size: 'lg'});"
            -
              text: Plugin
              href: "javascript:PluginWfBootstrapjs.modal({id: 'modal_plugin', url: '/editor/plugin', label: 'Plugin', size: 'lg'});"
          item_right:
            -
              text: Run
              onclick: "if(confirm('Are you sure to run this theme? Consider run this theme from a dedicated address!')){location.href='?loadtheme='+encodeURIComponent(this.getAttribute('data-theme'));}"
          element_after:
            -
              type: div
              innerHTML:
                - 
                  type: strong
                  attribute:
                    class: content-colon
                  innerHTML: Theme
                - 
                  type: span
                  innerHTML: globals:_SESSION/plugin/wf/editor/activetheme
                - 
                  type: strong
                  attribute:
                    class: content-colon
                  innerHTML: Folder
                - 
                  type: span
                  innerHTML: globals:_SESSION/plugin/wf/editor/activefolder
  theme_info:
    type: div
    attribute:
      class: 'container-fluit'
    innerHTML:
      -
        type: div
        attribute:
          class: 'col-md-12'
        innerHTML:
          -
            type: widget
            data:
              plugin: 'wf/editor'
              method: analyse
  container:
    type: div
    attribute:
      class: 'container-fluit'
      style: 'min-height:300px;'
    innerHTML:
  style2:
    type: style
    innerHTML: '.panel-body pre{background:lightgray;} .panel-body{padding-bottom:10px;} #wf_editor_workarea .panel-body{padding:0px;} #wf_editor_workarea .navbar{margin:0px;} #wf_editor_workarea textarea{font-family:courier new;}'