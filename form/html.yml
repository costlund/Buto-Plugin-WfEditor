    type: a
    innerHTML: Delete
    attribute:
      href: '#'
      onclick: "$.get('/editor/action?a=attribute_delete&file='+encodeURIComponent(document.getElementById('frm_element_attribute_file').value)+'&key='+encodeURIComponent(document.getElementById('frm_element_attribute_key').value)+'&attribute='+encodeURIComponent(document.getElementById('frm_element_attribute_attribute').value)+'', function(data){PluginWfCallbackjson.call( data );})"
      classzzz: 'btn btn-default'
